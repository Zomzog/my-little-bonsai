name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run all tests
        run: ./gradlew :composeApp:allTests --continue

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: composeApp/build/reports/tests/

  coverage:
    name: Code Coverage (Kover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run coverage report and verify 100% threshold
        run: ./gradlew :composeApp:koverXmlReport :composeApp:koverVerify

      - name: Upload Kover XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-report
          path: composeApp/build/reports/kover/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk

  build-web:
    name: Build Web (wasmJs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build wasmJs distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Upload web dist
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: composeApp/build/dist/wasmJs/productionExecutable/
